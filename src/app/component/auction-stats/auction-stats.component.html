<div class="prediction-stats">

  <!-- No current player -->
  <ng-container *ngIf="!currentPlayer">
    <div class="no-player-state">
      <div class="no-player-icon">🏏</div>
      <div class="no-player-text">Waiting for next player…</div>
    </div>
  </ng-container>

  <!-- Current player up for auction -->
  <ng-container *ngIf="currentPlayer">

    <!-- Section label -->
    <div class="ps-label">🎯 Prediction Split</div>

    <!-- No teams loaded yet -->
    <div *ngIf="pgTeams.length === 0" class="loading-teams">
      <span class="spinner-sm"></span> Loading…
    </div>

    <!-- No predictions yet -->
    <div *ngIf="pgTeams.length > 0 && totalTokens === 0" class="no-votes">
      No predictions placed yet
    </div>

    <!-- Team bars -->
    <div *ngIf="pgTeams.length > 0 && totalTokens > 0" class="team-bars">
      <div *ngFor="let tp of teamPredictions" class="team-bar-row">

        <div class="team-label">
          <span class="team-dot" [style.background]="tp.team.team_color"></span>
          <span class="team-short">{{ tp.team.team_short_name }}</span>
        </div>

        <div class="bar-track">
          <div class="bar-fill" [style.width.%]="tp.percentage" [style.background]="tp.team.team_color">
          </div>
        </div>

        <div class="team-pct" [style.color]="tp.tokens > 0 ? tp.team.team_color : '#94a3b8'">
          {{ tp.percentage }}%
        </div>

        <div class="team-multiplier" *ngIf="tp.tokens > 0" [class.high]="tp.percentage < 20">
          {{ getMultiplier(tp.tokens) }}
        </div>
        <div class="team-multiplier dim" *ngIf="tp.tokens === 0">—</div>

      </div>
    </div>

  </ng-container>
</div>
